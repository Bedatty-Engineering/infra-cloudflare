name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "stacks/**"
      - "modules/**"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.7.5"
  TF_CLI_ARGS: "-no-color"

jobs:
  detect-changes:
    name: Detect changed stacks
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.changed.outputs.stacks }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed stack directories
        id: changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^(stacks|modules)/' \
            | awk -F'/' '{print $2}' \
            | sort -u \
            | grep -v '^$' || true)

          MODULES_CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^modules/' | head -1 || true)

          if [ -n "$MODULES_CHANGED" ]; then
            echo "Module changes detected - planning all stacks"
            STACKS=$(ls stacks/ | jq -R . | jq -sc .)
          else
            if [ -z "$CHANGED" ]; then
              echo "No stack changes detected"
              STACKS="[]"
            else
              STACKS=$(echo "$CHANGED" | jq -R . | jq -sc .)
            fi
          fi

          echo "Stacks to plan: $STACKS"
          echo "stacks=$STACKS" >> "$GITHUB_OUTPUT"

  plan:
    name: Plan · ${{ matrix.stack }}
    needs: detect-changes
    if: needs.detect-changes.outputs.stacks != '[]'
    runs-on: ubuntu-latest
    # Each stack reads its own GitHub Environment, e.g. stack "profile"
    # uses environment "website-profile".
    environment:
      name: website-${{ matrix.stack }}
    env:
      # This must be job-scoped so it can read the stack-specific environment secret.
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.detect-changes.outputs.stacks) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask sensitive values
        env:
          TF_TOKEN: ${{ secrets.TF_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          echo "::add-mask::$TF_TOKEN"
          echo "::add-mask::$CF_API_TOKEN"
          echo "::add-mask::$CF_ACCOUNT_ID"
          echo "::add-mask::$CF_ZONE_ID"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check Terraform Cloud token
        run: |
          if [ -z "${TF_TOKEN_app_terraform_io}" ]; then
            echo "TF_TOKEN_app_terraform_io is not set for environment website-${{ matrix.stack }}"
            exit 1
          fi
          echo "Terraform Cloud token is present for website-${{ matrix.stack }}"

      - name: Terraform Init
        run: make init STACK=${{ matrix.stack }}

      - name: Terraform Validate
        run: make validate STACK=${{ matrix.stack }}

      - name: Terraform Plan
        id: plan
        env:
          # Secrets and vars come from the stack-specific GitHub Environment.
          TF_VAR_cloudflare_api_token:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id:    ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_domain: ${{ vars.DOMAIN }}
        run: make plan STACK=${{ matrix.stack }}
        continue-on-error: true

      - name: Post plan summary to PR
        uses: actions/github-script@v7
        if: always()
        continue-on-error: true
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          STACK: ${{ matrix.stack }}
        with:
          script: |
            const outcome = process.env.PLAN_OUTCOME;
            const stack = process.env.STACK;
            const icon = outcome === 'success' ? '✅' : '❌';
            const body = `### ${icon} Terraform Plan · \`${stack}\`\n\nPlan **${outcome}**. See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for full output.`;
            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } catch (error) {
              core.warning(`Failed to post PR comment: ${error.message}`);
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
